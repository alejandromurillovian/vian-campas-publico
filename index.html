<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="robots" content="noindex, nofollow">
<title>Plazas · Campas Madrid</title>
<style>
  :root {
    --bg: #14171c;
    --surface: #1c2128;
    --surface-2: #232a33;
    --line: #2e3742;
    --fg: #eef2f6;
    --fg-muted: #9aa6b2;
    --libre: #34d27b;
    --libre-bg: #0f3b24;
    --libre-line: #1d6840;
    --ocupada: #2b333d;
    --ocupada-fg: #5d6875;
    --accent: #ffb020;
    --stale: #ff6b5e;
    --cell: 46px;
    --gap: 5px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    background: var(--bg);
    color: var(--fg);
    font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    line-height: 1.4;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    flex: 0 0 auto;
    background: var(--surface);
    border-bottom: 1px solid var(--line);
    padding: 0.7rem 0.9rem 0;
  }
  .title-row {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 0.5rem;
    margin-bottom: 0.5rem;
  }
  h1 { font-size: 1rem; font-weight: 700; }
  h1 .accent { color: var(--accent); }
  .updated {
    font-size: 0.7rem;
    color: var(--fg-muted);
    white-space: nowrap;
    font-variant-numeric: tabular-nums;
  }
  .updated.stale { color: var(--stale); }

  .tabs {
    display: flex;
    gap: 0.25rem;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    flex: 0 0 auto;
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    color: var(--fg-muted);
    font-size: 0.82rem;
    font-weight: 600;
    padding: 0.5rem 0.7rem;
    cursor: pointer;
    white-space: nowrap;
    -webkit-tap-highlight-color: transparent;
  }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab .count { font-size: 0.7rem; color: var(--libre); margin-left: 0.3rem; font-weight: 700; }

  .toolbar {
    flex: 0 0 auto;
    display: flex;
    gap: 0.45rem;
    align-items: center;
    padding: 0.55rem 0.9rem;
    background: var(--surface);
    border-bottom: 1px solid var(--line);
  }
  #search {
    flex: 1;
    min-width: 0;
    background: var(--surface-2);
    border: 1px solid var(--line);
    color: var(--fg);
    font-size: 0.9rem;
    padding: 0.5rem 0.7rem;
    border-radius: 9px;
    outline: none;
  }
  #search:focus { border-color: var(--accent); }
  #search::placeholder { color: var(--fg-muted); }

  .toggle {
    flex: 0 0 auto;
    background: var(--surface-2);
    border: 1px solid var(--line);
    color: var(--fg-muted);
    font-size: 0.78rem;
    font-weight: 600;
    padding: 0.5rem 0.6rem;
    border-radius: 9px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    white-space: nowrap;
  }
  .toggle.active { background: var(--libre-bg); border-color: var(--libre-line); color: var(--libre); }

  .zoom { flex: 0 0 auto; display: flex; gap: 0.2rem; }
  .zoom button {
    width: 32px;
    height: 32px;
    background: var(--surface-2);
    border: 1px solid var(--line);
    color: var(--fg);
    font-size: 1.1rem;
    border-radius: 8px;
    cursor: pointer;
    line-height: 1;
    -webkit-tap-highlight-color: transparent;
  }

  .plan-wrap {
    flex: 1 1 auto;
    overflow: auto;
    position: relative;
    -webkit-overflow-scrolling: touch;
    padding: 0.9rem;
  }
  .plan {
    display: grid;
    gap: var(--gap);
    width: max-content;
    margin: 0 auto;
  }

  .plaza {
    width: var(--cell);
    height: var(--cell);
    background: var(--ocupada);
    color: var(--ocupada-fg);
    border: 1px solid transparent;
    border-radius: 7px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: calc(var(--cell) * 0.28);
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    text-align: center;
    line-height: 1;
    padding: 1px;
    white-space: nowrap;
  }
  .plaza.libre {
    background: var(--libre-bg);
    color: var(--libre);
    border-color: var(--libre-line);
  }
  .plaza.dim { opacity: 0.18; }
  .plaza.hit { outline: 2px solid var(--accent); outline-offset: 1px; }

  .totals {
    flex: 0 0 auto;
    display: flex;
    gap: 1rem;
    justify-content: center;
    padding: 0.5rem 0.9rem;
    background: var(--surface);
    border-top: 1px solid var(--line);
    font-size: 0.76rem;
    color: var(--fg-muted);
    font-variant-numeric: tabular-nums;
  }
  .totals b { font-weight: 700; font-size: 0.9rem; }
  .totals .l b { color: var(--libre); }
  .totals .o b { color: var(--fg); }

  .status {
    text-align: center;
    color: var(--fg-muted);
    font-size: 0.9rem;
    padding: 3rem 1rem;
  }
  .status.error { color: var(--stale); }
</style>
</head>
<body>
<header>
  <div class="title-row">
    <h1>Plazas <span class="accent">Madrid</span></h1>
    <span class="updated" id="updated">—</span>
  </div>
  <div class="tabs" id="tabs"></div>
</header>

<div class="toolbar">
  <input type="search" id="search" placeholder="Buscar plaza…" autocomplete="off" inputmode="search">
  <button class="toggle" id="toggleLibre">Solo libres</button>
  <div class="zoom">
    <button id="zoomOut" aria-label="Alejar">−</button>
    <button id="zoomIn" aria-label="Acercar">+</button>
  </div>
</div>

<div class="plan-wrap" id="planWrap">
  <div class="status" id="status">Cargando plano…</div>
</div>

<div class="totals" id="totals" style="display:none">
  <span class="l"><b id="t-libre">—</b> libres</span>
  <span class="o"><b id="t-occ">—</b> ocupadas</span>
  <span><b id="t-total">—</b> total</span>
</div>

<script>
(function () {
  "use strict";

  var JSON_URL = "madrid.json";
  var REFRESH_MS = 120000;
  var STALE_MIN = 20;
  var CELL_MIN = 12, CELL_MAX = 80, CELL_STEP = 6;

  var state = { data: null, activeCampa: null, onlyLibre: false, query: "", cell: 46 };

  var els = {
    tabs: document.getElementById("tabs"),
    planWrap: document.getElementById("planWrap"),
    status: document.getElementById("status"),
    updated: document.getElementById("updated"),
    search: document.getElementById("search"),
    toggleLibre: document.getElementById("toggleLibre"),
    zoomIn: document.getElementById("zoomIn"),
    zoomOut: document.getElementById("zoomOut"),
    totals: document.getElementById("totals"),
    tLibre: document.getElementById("t-libre"),
    tOcc: document.getElementById("t-occ"),
    tTotal: document.getElementById("t-total")
  };

  function fmtAge(iso) {
    var then = new Date(iso).getTime();
    if (isNaN(then)) return { text: "fecha desconocida", stale: true };
    var mins = Math.round((Date.now() - then) / 60000);
    var stale = mins >= STALE_MIN, text;
    if (mins < 1) text = "actualizado hace un momento";
    else if (mins === 1) text = "actualizado hace 1 min";
    else if (mins < 60) text = "actualizado hace " + mins + " min";
    else { var h = Math.floor(mins / 60); text = "actualizado hace " + h + (h === 1 ? " hora" : " horas"); }
    return { text: text, stale: stale };
  }

  function esc(s) {
    return String(s).replace(/[&<>"']/g, function (c) {
      return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c];
    });
  }

  function renderTabs() {
    var d = state.data;
    var names = Object.keys(d.campas).sort(function (a, b) {
      return a.localeCompare(b, "es", { numeric: true });
    });
    if (state.activeCampa === null && names.length) state.activeCampa = names[0];

    els.tabs.innerHTML = names.map(function (n) {
      var plazas = d.campas[n];
      var libres = plazas.filter(function (p) { return !p.occupied; }).length;
      var active = n === state.activeCampa ? " active" : "";
      return '<button class="tab' + active + '" data-campa="' + esc(n) + '">' +
             esc(n) + '<span class="count">' + libres + '</span></button>';
    }).join("");

    Array.prototype.forEach.call(els.tabs.querySelectorAll(".tab"), function (t) {
      t.addEventListener("click", function () {
        state.activeCampa = t.getAttribute("data-campa");
        renderTabs();
        renderPlan();
      });
    });
  }

  function renderPlan() {
    var d = state.data;
    if (!d || state.activeCampa === null) return;
    var plazas = d.campas[state.activeCampa];

    var rows = plazas.map(function (p) { return p.row; });
    var cols = plazas.map(function (p) { return p.col; });
    var minR = Math.min.apply(null, rows), maxR = Math.max.apply(null, rows);
    var minC = Math.min.apply(null, cols), maxC = Math.max.apply(null, cols);
    var nRows = maxR - minR + 1, nCols = maxC - minC + 1;

    var q = state.query.trim().toLowerCase();

    var html = '<div class="plan" style="grid-template-columns:repeat(' + nCols +
               ',var(--cell));grid-template-rows:repeat(' + nRows + ',var(--cell))">';

    plazas.forEach(function (p) {
      var gr = (p.row - minR) + 1;
      var gc = (p.col - minC) + 1;
      var cls = "plaza" + (p.occupied ? "" : " libre");

      var matchQ = q && (p.code.toLowerCase().indexOf(q) !== -1 ||
                          String(p.zona || "").toLowerCase().indexOf(q) !== -1);
      var hideLibre = state.onlyLibre && p.occupied;

      if (hideLibre) cls += " dim";
      if (q) { if (matchQ) cls += " hit"; else cls += " dim"; }

      html += '<div class="' + cls + '" style="grid-row:' + gr + ';grid-column:' + gc + '" title="' + esc(p.code) + (p.zona ? ' · Zona ' + esc(p.zona) : '') + '">' +
              esc(p.code) +
              '</div>';
    });
    html += '</div>';

    els.planWrap.innerHTML = html;
    els.planWrap.scrollTop = 0;
    els.planWrap.scrollLeft = 0;

    var gl = 0, go = 0, gt = 0;
    Object.keys(d.campas).forEach(function (n) {
      d.campas[n].forEach(function (p) { gt++; if (p.occupied) go++; else gl++; });
    });
    els.tLibre.textContent = gl;
    els.tOcc.textContent = go;
    els.tTotal.textContent = gt;
    els.totals.style.display = "flex";
  }

  function applyMeta() {
    var age = fmtAge(state.data.updatedAt);
    els.updated.textContent = age.text;
    els.updated.classList.toggle("stale", age.stale);
  }

  function setCell(v) {
    state.cell = Math.max(CELL_MIN, Math.min(CELL_MAX, v));
    document.documentElement.style.setProperty("--cell", state.cell + "px");
  }

  function load(initial) {
    fetch(JSON_URL, { cache: "no-store" })
      .then(function (r) { if (!r.ok) throw new Error("HTTP " + r.status); return r.json(); })
      .then(function (data) {
        state.data = data;
        applyMeta();
        renderTabs();
        renderPlan();
      })
      .catch(function () {
        if (initial) {
          els.status.className = "status error";
          els.status.textContent = "No se pudo cargar el plano. Revisa la conexión y vuelve a intentarlo.";
        }
      });
  }

  els.search.addEventListener("input", function () { state.query = this.value; renderPlan(); });
  els.toggleLibre.addEventListener("click", function () {
    state.onlyLibre = !state.onlyLibre;
    this.classList.toggle("active", state.onlyLibre);
    renderPlan();
  });
  els.zoomIn.addEventListener("click", function () { setCell(state.cell + CELL_STEP); });
  els.zoomOut.addEventListener("click", function () { setCell(state.cell - CELL_STEP); });

  setInterval(function () { if (state.data) applyMeta(); }, 30000);
  setInterval(function () { load(false); }, REFRESH_MS);

  load(true);
})();
</script>
</body>
</html>
